<!DOCTYPE html>
<html>

<head>

    <title>Register</title>

    <link rel="stylesheet" href="css/style.css">

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</head>

<body>

<div class="auth-container">

    <div class="auth-card">

        <h1>Create Account</h1>

        <form id="registerForm">

            <label>First Name</label>

            <input
                type="text"
                id="firstName"
                autocomplete="off"
                required
            >

            <label>Last Name</label>

            <input
                type="text"
                id="lastName"
                autocomplete="off"
                required
            >

            <label>Email</label>

            <input
                type="email"
                id="email"
                autocomplete="off"
                required
            >

            <label>Password</label>

            <input
                type="password"
                id="password"
                autocomplete="off"
                required
            >

            <label>Confirm Password</label>

            <input
                type="password"
                id="confirmPassword"
                autocomplete="off"
                required
            >

            <button type="submit">
                Register
            </button>
            <p
    id="message"
    class="form-message">
</p>

        </form>

        <p class="link-text">

            Already have account?

            <a href="login.html">
                Login
            </a>

        </p>

    </div>

</div>

<!-- Custom Toast -->
<div
    id="toast"
    class="custom-toast">

    <div class="toast-content">

        <span id="toastIcon">
            ✔
        </span>

        <div>

            <h4 id="toastTitle"></h4>

            <p id="toastMessage"></p>

        </div>

        <button onclick="closeToast()">
            OK
        </button>

    </div>

</div>

<script src="js/register.js"></script>

</body>

</html>
